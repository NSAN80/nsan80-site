<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSAN80</title>

<link rel="stylesheet" href="css/style.css">

<style>

body {
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:#0b1220;
color:#d7dde7;
font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}

.boot {
text-align:center;
max-width:600px;
}

.title {
font-size:28px;
letter-spacing:1px;
margin-bottom:18px;
}

.subtitle {
font-family:monospace;
color:#7aa2d6;
opacity:.85;
margin-bottom:40px;
}

.loader {
width:120px;
height:2px;
background:#1c2a3f;
margin:auto;
position:relative;
overflow:hidden;
}

.loader::after {
content:"";
position:absolute;
left:-40%;
width:40%;
height:100%;
background:#3da9fc;
animation:bootline 2.5s linear infinite;
}

@keyframes bootline {
0% { left:-40%; }
100% { left:100%; }
}

.status {
margin-top:18px;
font-family:monospace;
color:#9fb3c8;
font-size:13px;
}

</style>

</head>

<body>

<div class="boot">

<div class="title">
Under Collaborative Inspiration
</div>

<div class="subtitle">
Human + AI environment initializing
</div>

<div class="loader"></div>

<div class="status">
systems preparing • collaboration loading
</div>

</div>

</body>
</html>
