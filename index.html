<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NSAN80</title>

<style>

body {
display:flex;
align-items:center;
justify-content:center;
height:100vh;
background:#0b1220;
color:#d7dde7;
font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
}

.boot {
text-align:center;
max-width:600px;
}

.title {
font-size:30px;
letter-spacing:1px;
margin-bottom:18px;
}

.subtitle {
font-family:monospace;
color:#7aa2d6;
margin-bottom:40px;
}

.loader {
width:200px;
height:4px;
background:#1c2a3f;
margin:auto;
position:relative;
overflow:hidden;
border-radius:2px;
}

.loader::after {
content:"";
position:absolute;
left:-50%;
width:50%;
height:100%;
background:#3da9fc;
animation:bootline 2s linear infinite;
}

@keyframes bootline {
0% { left:-50%; }
100% { left:100%; }
}

.status {
margin-top:20px;
font-family:monospace;
color:#9fb3c8;
font-size:14px;
}

</style>

</head>

<body>

<div class="boot">

<div class="title">
Under Collaborative Inspiration
</div>

<div class="subtitle">
Human + AI environment initializing
</div>

<div class="loader"></div>

<div class="status" id="statusLine"></div>

</div>

<script>

const messages = [

"systems preparing • collaboration loading",
"initializing curiosity engine",
"verifying caffeine levels",
"synchronizing human intuition",
"ai ready • humans improvising",
"checking if this idea is brilliant or ridiculous",
"loading unreasonable optimism"

];

const line = messages[Math.floor(Math.random()*messages.length)];

document.getElementById("statusLine").innerText = line;

</script>

</body>
</html>
